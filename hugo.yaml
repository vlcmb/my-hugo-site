baseURL: "https://vlcmb.github.io/site"
languageCode: en
title: "Valentin's Portfolio"

# Use Hugo modules to add theme
module:
  imports:
  - path: github.com/hugo-toha/toha/v4
  mounts:
  - source: static/files
    target: static/files
  - source: ./node_modules/flag-icons/flags
    target: static/flags
  - source: ./node_modules/@fontsource/mulish/files
    target: static/files
  - source: ./node_modules/katex/dist/fonts
    target: static/fonts

# Language configuration
languages:
  en:
    languageCode: en
    languageName: English
    title: "Valentin's Portfolio"
    weight: 1

# default language for the content
defaultContentLanguage: en

# Allow raw html in markdown file
markup:
  goldmark:
    renderer:
      unsafe: true
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false

# client-side JavaScript search
outputs:
  home:
    - HTML
    - RSS
    - JSON

# Enable global emoji support
enableEmoji: true

# Site parameters
params:
  # Background image of the landing page
  background: /images/site/background.jpg

  # Provide logos for your site
  logo:
    main: /images/site/main-logo.png
    inverted: /images/site/inverted-logo.png
    favicon: /images/site/favicon.png

  # GitHub repo of your site
  gitRepo: https://github.com/vlcmb/vlcmb.github.io
  gitBranch: main

  # Configure the number of section title visible in the top navbar
  topNavbar:
    maxVisibleSections: 5

  # Configure various features of this theme
  features:
    # Configure theme color settings
    theme:
      enable: true
      services:
        light: true
        dark: true
        default: system

    # Enable and configure portfolio
    portfolio:
      enable: true

    # Enable and configure blog posts
    blog:
      enable: true
      showAuthor: true
      shareButtons:
        facebook: true
        twitter: true
        linkedin: true
        email: true

    # Enable & configure "Notes" features
    notes:
      enable: false

    # Disable comments for now
    comment:
      enable: false

    # Disable analytics for now
    analytics:
      enable: false

    # Disable support section
    support:
      enable: false

    # Table of Contents in reading page
    toc:
      enable: true

    # Show tags under the post title
    tags:
      enable: true
      on_card: true

    # Language flags
    flags:
      enable: false

    # Enable PDF embedding
    embedpdf:
      enable: true

    # Enable flowcharts
    flowchart:
      enable: true
      services:
        mermaid:
          theme: forest

    # Enable math (KaTeX)
    math:
      enable: true
      services:
        katex:
          delimiters:
            - left: $$
              right: $$
              display: true
            - left: \\[
              right: \\]
              display: true
            - left: $
              right: $
              display: false
            - left: \\(
              right: \\)
              display: false

    # Syntax highlighting
    syntaxHighlight:
      enable: true
      services:
        hljs:
          noHighlightRe: /^no-highlight$/i

    # Copy code button
    copyCodeButton:
      enable: true

    # Reading time
    readingTime:
      enable: true

    # Pagination
    pagination:
      maxPostsPerPage: 12

  # Footer configuration
  footer:
    enable: true
    navigation:
      enable: true
      customMenus: false
    contactMe:
      enable: true
    credentials:
      enable: true
    newsletter:
      enable: false
    disclaimer:
      enable: false
